<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning App</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div id="home-panel" class="tab-content"></div>
      <div id="courses-panel" class="tab-content"></div>
      <div id="subjects-panel" class="tab-content">
        <div class="panel-header">
          <button class="back-button">&#8249;</button>
          <div class="panel-title">
            <span class="panel-title-small"></span>
            <h2 class="panel-title-big"></h2>
          </div>
        </div>
      </div>
      <div id="categories-panel" class="tab-content">
        <div class="panel-header">
          <button class="back-button">&#8249;</button>
          <div class="panel-title">
            <span class="panel-title-small"></span>
            <h2 class="panel-title-big"></h2>
          </div>
        </div>
      </div>
      <div id="lessons-panel" class="tab-content">
        <div class="panel-header">
          <button class="back-button">&#8249;</button>
          <div class="panel-title">
            <span class="panel-title-small"></span>
            <h2 class="panel-title-big"></h2>
          </div>
        </div>
      </div>
      <div id="lessons-content-panel" class="tab-content">
        <div class="panel-header">
          <button class="back-button">&#8249;</button>
          <div class="panel-title">
            <span class="panel-title-small"></span>
            <h2 class="panel-title-big"></h2>
          </div>
        </div>
        <div id="lesson-content"></div>
      </div>
      <div id="statistics-panel" class="tab-content"></div>
      <div id="nav">
        <button class="tab-button" data-target="home-panel">
          <span class="tab-icon">🏠</span>
          <span class="tab-label">Home</span>
        </button>
        <button class="tab-button" data-target="courses-panel">
          <span class="tab-icon">📖</span>
          <span class="tab-label">Learn</span>
        </button>
        <button class="tab-button" data-target="statistics-panel">
          <span class="tab-icon">📊</span>
          <span class="tab-label">Stats</span>
        </button>
      </div>
    </div>
    <script src="js/lesson-renderer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
