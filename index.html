<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="home-panel" class="tab-content">Home Content</div>
      <div id="courses-panel" class="tab-content"></div>
      <div id="subjects-panel" class="tab-content">
        <button class="back-button" data-target="courses-panel">Back</button>
      </div>
      <div id="categories-panel" class="tab-content">
        <button class="back-button" data-target="subjects-panel">Back</button>
      </div>
      <div id="lessons-panel" class="tab-content">
        <button class="back-button" data-target="categories-panel">Back</button>
      </div>
      <div id="statistics-panel" class="tab-content">Statistics Content</div>
      <div id="nav">
        <button class="tab-button" data-target="home-panel">Home</button>
        <button class="tab-button" data-target="courses-panel">Courses</button>
        <button class="tab-button" data-target="statistics-panel">Statistics</button>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
